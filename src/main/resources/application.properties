spring.application.name=ecommerce-order-management

# Server
server.port=8080

# Default profile uses H2 so the app starts without MySQL installed.
# Switch to MySQL with: --spring.profiles.active=mysql
spring.datasource.url=jdbc:h2:mem:ecommerce;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 console (optional): http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT (placeholder — wired up in Commit 4)
app.jwt.secret=ChangeThisSecretKeyToSomethingLongAndSecureForEcommerceApp2026
app.jwt.expiration-ms=86400000
